version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DANA Web App - Docker Compose
# Run with: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PHP/Apache Application ──────────────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE:-romsarmiento0125/dana-web-app}:${IMAGE_TAG:-latest}
    container_name: dana_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - ./docker/env/app.env
      - ./docker/env/database.env

    depends_on:
      db:
        condition: service_healthy
    networks:
      - dana_network
    volumes:
      # Persist writable folder (logs, cache, uploads)
      - dana_writable:/var/www/html/writable

  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: dana_db
    restart: unless-stopped
    env_file:
      - ./docker/env/database.env
    volumes:
      - dana_db_data:/var/lib/mysql
      # Optional: put .sql init scripts here and they run on first start
      # - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dana_network

  # ── phpMyAdmin (optional, comment out in production if not needed) ──────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dana_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    env_file:
      - ./docker/env/phpmyadmin.env
    depends_on:
      - db
    networks:
      - dana_network

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  dana_db_data:
    driver: local
  dana_writable:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  dana_network:
    driver: bridge
