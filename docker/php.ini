; ── PHP Production Configuration for CodeIgniter 4 ──────────────────────────

[PHP]
; Memory limit - increase if your app needs it
memory_limit = 256M

; Max upload sizes
upload_max_filesize = 64M
post_max_size = 64M

; Execution time
max_execution_time = 60
max_input_time = 60

; Error reporting (turn off display for production)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/writable/logs/php_errors.log

; OPcache settings for performance
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1

; Timezone
date.timezone = Asia/Manila
